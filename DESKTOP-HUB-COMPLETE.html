<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cafe Dreamr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">

<style>
/* --- BASE STYLES --- */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #120f1d;
  --panel: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.12);
  --text: #fff8ff;
  --pink: #ffc2e6;
  --lavender: #d9c2ff;
}

body {
  font-family: 'Quicksand', sans-serif;
  background: radial-gradient(circle at top, rgba(180,120,255,0.25), transparent 35%),
              linear-gradient(180deg, #1a152b 0%, #0d0b14 100%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* --- NAVIGATION --- */
.topbar {
  position: sticky; top: 0; z-index: 100; height: 78px;
  display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
  background: rgba(10,10,18,0.65); backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
}

.brand h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; }

.layout {
  display: grid; grid-template-columns: 90px 1fr 340px; gap: 24px;
  padding: 24px; max-width: 1700px; margin: auto;
}

/* --- DOCK --- */
.dock { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 110px; height: fit-content; }
.icon {
  width: 64px; height: 64px; border-radius: 22px;
  display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
  background: var(--panel); border: 1px solid var(--border);
  backdrop-filter: blur(16px); cursor: pointer; transition: 0.3s;
}
.icon:hover { background: var(--pink); color: #120f1d; transform: translateY(-3px); }

/* --- MAIN CONTENT --- */
.main { display: flex; flex-direction: column; gap: 24px; }

/* HERO BANNER (Now above chat) */
.hero-banner {
  height: 240px; border-radius: 30px; overflow: hidden;
  position: relative; border: 1px solid var(--border);
  background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
              url('https://images.unsplash.com/photo-1518895949257-7621c3c786d7?q=80&w=1600&auto=format&fit=crop');
  background-size: cover; background-position: center;
  display: flex; flex-direction: column; justify-content: center; padding: 40px;
}
.hero-banner h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; }

/* DISCORD CHAT */
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 30px; overflow: hidden; backdrop-filter: blur(18px); }
.panel-header { padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
.discord-chat-card { height: 600px; display: flex; flex-direction: column; }
.discord-chat-card iframe { flex: 1; border: none; mix-blend-mode: lighten; filter: saturate(0.9); }

/* --- DYNAMIC CALENDAR --- */
#calendar-month-name { color: var(--pink); font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 20px; }
.day { aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); font-size: 0.85rem; }
.day.today { background: var(--pink); color: #120f1d; font-weight: bold; box-shadow: 0 0 15px var(--pink); }

/* --- SIDEBAR & PLAYER --- */
.sidebar { display: flex; flex-direction: column; gap: 24px; }
.music-wrapper { padding: 20px; }
.now-playing-info { text-align: center; margin-bottom: 15px; font-weight: bold; color: var(--pink); font-size: 0.9rem; }
.player-controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
.player-btn { background: rgba(255,255,255,0.1); border: none; color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
.player-btn:hover { background: var(--pink); color: #120f1d; }
.track-item { padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 5px; cursor: pointer; font-size: 0.8rem; }
.track-item.active { border-left: 3px solid var(--pink); background: rgba(255,194,230,0.1); }

/* --- HOVER MEMBER LIST --- */
.status-card { height: 300px; position: relative; }
.status-placeholder { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.pulse-icon { width: 10px; height: 10px; background: var(--pink); border-radius: 50%; margin-bottom: 10px; box-shadow: 0 0 10px var(--pink); animation: pulse 2s infinite; }
.discord-member-iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; opacity: 0; transition: 0.4s; mix-blend-mode: lighten; }
.status-card:hover .status-placeholder { opacity: 0; }
.status-card:hover .discord-member-iframe { opacity: 1; }

@keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.3); opacity: 1; } }

/* --- MODAL --- */
.modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 999; }
.modal-content { width: 450px; background: #1a152b; border: 1px solid var(--border); border-radius: 30px; padding: 30px; }
textarea { width: 100%; min-height: 120px; margin-top: 15px; border-radius: 15px; background: rgba(255,255,255,0.05); color: white; border: none; padding: 15px; resize: none; }

button { border: none; border-radius: 999px; padding: 10px 20px; font-family: inherit; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, var(--pink), var(--lavender)); }

@media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } .dock { display: none; } }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand"><h1>☕ Cafe Dreamr</h1></div>
  <nav style="display:flex; gap:15px;"><button onclick="openCalendar()">Dream Log</button></nav>
</header>

<section class="layout">
  <aside class="dock">
    <div class="icon">🏠</div><div class="icon">☕</div><div class="icon">🌙</div><div class="icon">📓</div>
  </aside>

  <main class="main">
    <div class="hero-banner">
      <h2 id="greeting">Good evening, Dreamr ✨</h2>
      <p>The kettle is on and the chat is live.</p>
    </div>

    <section class="card discord-chat-card">
      <div class="panel-header">💬 Café Chat <span style="font-size: 0.7rem; opacity: 0.5;">LIVE PORTAL</span></div>
      <iframe src="https://e.widgetbot.io/channels/1498131914798665829"></iframe>
    </section>
  </main>

  <aside class="sidebar">
    <section class="card">
      <div class="panel-header">📅 <span id="calendar-month-name">Month</span></div>
      <div class="calendar-grid" id="calendar-days">
        </div>
    </section>

    <section class="card status-card">
      <div class="panel-header">🫶 Online Now</div>
      <div class="status-placeholder">
        <div class="pulse-icon"></div>
        <p style="font-size: 0.8rem; opacity: 0.6;">Hover to peek...</p>
      </div>
      <iframe src="https://e.widgetbot.io/channels/1498131914798665829" class="discord-member-iframe"></iframe>
    </section>

    <section class="card">
      <div class="panel-header">🎧 Jukebox</div>
      <div class="music-wrapper">
        <audio id="main-audio"></audio>
        <div class="now-playing-info" id="track-title">Select a track</div>
        <div class="player-controls">
          <button class="player-btn" onclick="prevTrack()">⏮</button>
          <button class="player-btn" onclick="togglePlay()" id="play-btn">▶</button>
          <button class="player-btn" onclick="nextTrack()">⏭</button>
        </div>
        <div id="playlist-list"></div>
      </div>
    </section>
  </aside>
</section>

<div class="modal" id="calendar-modal">
  <div class="modal-content">
    <h2>📓 Dream Log</h2>
    <textarea id="dream-note" placeholder="What happened in the dream?"></textarea>
    <div style="margin-top: 15px; display: flex; gap: 10px;">
      <button onclick="saveNote()">Save</button><button onclick="closeCalendar()" style="background:none; color:white; border:1px solid var(--border)">Close</button>
    </div>
  </div>
</div>

<script>
// --- DYNAMIC CALENDAR LOGIC ---
function generateCalendar() {
  const now = new Date();
  const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  document.getElementById('calendar-month-name').innerText = monthNames[now.getMonth()];
  
  const daysContainer = document.getElementById('calendar-days');
  const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const today = now.getDate();

  for (let i = 1; i <= lastDay; i++) {
    const dayEl = document.createElement('div');
    dayEl.className = 'day' + (i === today ? ' today' : '');
    dayEl.innerText = i;
    daysContainer.appendChild(dayEl);
  }

  // Update Greeting based on time
  const hr = now.getHours();
  const greeting = document.getElementById('greeting');
  if(hr < 12) greeting.innerText = "Good morning, Dreamr ✨";
  else if(hr < 18) greeting.innerText = "Good afternoon, Dreamr ✨";
  else greeting.innerText = "Good evening, Dreamr ✨";
}

// --- MUSIC LOGIC ---
const songs = [
  { title: "Midnight Lo-fi", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
  { title: "Rainy Cafe", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" }
];

let currentTrack = 0;
const audio = document.getElementById('main-audio');
const playBtn = document.getElementById('play-btn');
const trackTitle = document.getElementById('track-title');

function initPlayer() {
  const container = document.getElementById('playlist-list');
  songs.forEach((song, i) => {
    const div = document.createElement('div');
    div.className = 'track-item';
    div.innerText = song.title;
    div.onclick = () => loadTrack(i);
    container.appendChild(div);
  });
  loadTrack(0, false);
}

function loadTrack(i, playNow = true) {
  currentTrack = i; audio.src = songs[i].url;
  trackTitle.innerText = songs[i].title;
  document.querySelectorAll('.track-item').forEach((el, idx) => el.classList.toggle('active', idx === i));
  if(playNow) { audio.play(); playBtn.innerText = '⏸'; }
}

function togglePlay() {
  if(audio.paused) { audio.play(); playBtn.innerText = '⏸'; }
  else { audio.pause(); playBtn.innerText = '▶'; }
}

function nextTrack() { loadTrack((currentTrack + 1) % songs.length); }
function prevTrack() { loadTrack((currentTrack - 1 + songs.length) % songs.length); }
audio.onended = nextTrack;

// --- MODAL UTILS ---
function openCalendar() { document.getElementById('calendar-modal').style.display = 'flex'; }
function closeCalendar() { document.getElementById('calendar-modal').style.display = 'none'; }
function saveNote() { alert('Dream Recorded! ✨'); closeCalendar(); }

// INIT
generateCalendar();
initPlayer();
</script>

</body>
</html>
