<!DOCTYPE html>
<html lang="en">
<head><script src="/.nekoweb-api/static/site.js" defer></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cafe Dreamr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">

<style>
/* --- BASE STYLES --- */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #120f1d;
  --panel: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.12);
  --text: #fff8ff;
  --pink: #ffc2e6;
  --lavender: #d9c2ff;
  --notedot: #ff4d6d;
}

body {
  font-family: 'Quicksand', sans-serif;
  background: radial-gradient(circle at top, rgba(180,120,255,0.25), transparent 35%),
              linear-gradient(180deg, #1a152b 0%, #0d0b14 100%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* --- NAVIGATION --- */
.topbar {
  position: sticky; top: 0; z-index: 100; height: 78px;
  display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
  background: rgba(10,10,18,0.65); backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
}

.brand h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; }

.layout {
  display: grid; grid-template-columns: 90px 1fr 340px; gap: 24px;
  padding: 24px; max-width: 1700px; margin: auto;
}

/* --- DOCK --- */
.dock { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 110px; height: fit-content; }
.icon {
  width: 64px; height: 64px; border-radius: 22px;
  display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
  background: var(--panel); border: 1px solid var(--border);
  backdrop-filter: blur(16px); cursor: pointer; transition: 0.3s;
}
.icon:hover { background: var(--pink); color: #120f1d; transform: translateY(-3px); }

/* --- MAIN --- */
.main { display: flex; flex-direction: column; gap: 24px; }

.hero-banner {
  height: 220px; border-radius: 30px; overflow: hidden;
  border: 1px solid var(--border);
  background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
              url('https://images.unsplash.com/photo-1518895949257-7621c3c786d7?q=80&w=1600&auto=format&fit=crop');
  background-size: cover; background-position: center;
  display: flex; flex-direction: column; justify-content: center; padding: 40px;
}
.hero-banner h2 { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; }

.card { background: var(--panel); border: 1px solid var(--border); border-radius: 30px; overflow: hidden; backdrop-filter: blur(18px); }
.panel-header { padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); font-weight: bold; }

.discord-chat-card { height: 550px; display: flex; flex-direction: column; }
.discord-chat-card iframe { flex: 1; border: none; mix-blend-mode: lighten; filter: saturate(0.9); }

/* --- CALENDAR --- */
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 20px; }
.day { 
  aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; 
  align-items: center; justify-content: center; background: rgba(255,255,255,0.05); 
  font-size: 0.85rem; cursor: pointer; position: relative; transition: 0.2s;
}
.day:hover { background: rgba(255,255,255,0.12); border-color: var(--lavender); }
.day.today { border: 1px solid var(--pink); color: var(--pink); font-weight: bold; }
.dot { width: 5px; height: 5px; background: var(--notedot); border-radius: 50%; position: absolute; bottom: 6px; box-shadow: 0 0 8px var(--notedot); }

/* --- SIDEBAR --- */
.sidebar { display: flex; flex-direction: column; gap: 24px; }

/* HOVER MEMBER LIST */
.status-card { height: 280px; position: relative; }
.status-placeholder { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
.discord-member-iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; opacity: 0; transition: 0.4s; mix-blend-mode: lighten; }
.status-card:hover .discord-member-iframe { opacity: 1; }

/* JUKEBOX */
.music-wrapper { padding: 20px; }
.player-btn { background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
.track-item { padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 5px; cursor: pointer; font-size: 0.8rem; }
.track-item.active { border-left: 3px solid var(--pink); background: rgba(255,194,230,0.1); }

/* --- MODAL --- */
.modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 999; }
.modal-content { width: 480px; background: #1a152b; border: 1px solid var(--border); border-radius: 30px; padding: 30px; }
.timestamp-label { font-size: 0.75rem; color: var(--lavender); opacity: 0.8; margin-top: 10px; display: block; }
textarea { width: 100%; min-height: 150px; margin-top: 10px; border-radius: 15px; background: rgba(255,255,255,0.05); color: white; border: none; padding: 15px; resize: none; font-family: inherit; font-size: 0.95rem; line-height: 1.5; }
button { border: none; border-radius: 999px; padding: 12px 25px; font-family: inherit; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, var(--pink), var(--lavender)); transition: 0.3s; }
button:hover { transform: scale(1.05); filter: brightness(1.1); }

@media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } .dock { display: none; } }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand"><h1>☕ Cafe Dreamr</h1></div>
  <div id="live-clock" style="font-weight: 500; letter-spacing: 1px;"></div>
</header>

<section class="layout">
  <aside class="dock">
    <div class="icon">🏠</div><div class="icon">☕</div><div class="icon">🌙</div><div class="icon">📓</div>
  </aside>

  <main class="main">
    <div class="hero-banner">
      <h2 id="greeting">Welcome, Dreamr ✨</h2>
      <p>The time is yours to spend.</p>
    </div>

    <section class="card discord-chat-card">
      <div class="panel-header">💬 Café Chat</div>
      <iframe src="https://e.widgetbot.io/channels/1498131914798665829"></iframe>
    </section>
  </main>

  <aside class="sidebar">
    <section class="card">
      <div class="panel-header">📅 <span id="calendar-month-name" style="color:var(--pink)">Month</span></div>
      <div class="calendar-grid" id="calendar-days"></div>
    </section>

    <section class="card status-card">
      <div class="panel-header">🫶 Online Now</div>
      <div class="status-placeholder"><p style="font-size: 0.8rem; opacity: 0.5;">Hover to peek members</p></div>
      <iframe src="https://e.widgetbot.io/channels/1498131914798665829" class="discord-member-iframe"></iframe>
    </section>

    <section class="card">
      <div class="panel-header">🎧 Jukebox</div>
      <div class="music-wrapper">
        <audio id="main-audio"></audio>
        <div id="track-title" style="text-align:center; margin-bottom:12px; color:var(--pink); font-weight:700;">Track Title</div>
        <div style="display:flex; justify-content:center; gap:12px; margin-bottom:15px;">
          <button class="player-btn" onclick="prevTrack()">⏮</button>
          <button class="player-btn" onclick="togglePlay()" id="play-btn">▶</button>
          <button class="player-btn" onclick="nextTrack()">⏭</button>
        </div>
        <div id="playlist-list"></div>
      </div>
    </section>
  </aside>
</section>

<div class="modal" id="calendar-modal">
  <div class="modal-content">
    <h2 id="modal-date-title" style="font-family:'Cormorant Garamond', serif; font-size: 2rem;">📓 Log</h2>
    <span id="last-saved-time" class="timestamp-label"></span>
    <textarea id="dream-note" placeholder="What's on your mind?"></textarea>
    <div style="margin-top: 20px; display: flex; gap: 10px;">
      <button onclick="saveNote()">Save & Timestamp</button>
      <button onclick="closeCalendar()" style="background:none; color:white; border:1px solid var(--border)">Cancel</button>
    </div>
  </div>
</div>

<script>
let selectedDateKey = "";

// --- TIME & CLOCK ---
function updateClock() {
  const now = new Date();
  document.getElementById('live-clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  setTimeout(updateClock, 1000);
}

// --- CALENDAR LOGIC ---
function generateCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  
  document.getElementById('calendar-month-name').innerText = monthNames[month];
  
  const daysContainer = document.getElementById('calendar-days');
  daysContainer.innerHTML = '';
  const lastDay = new Date(year, month + 1, 0).getDate();

  for (let i = 1; i <= lastDay; i++) {
    const dayEl = document.createElement('div');
    dayEl.className = 'day' + (i === now.getDate() ? ' today' : '');
    dayEl.innerText = i;
    
    const dateKey = `${year}-${month + 1}-${i}`;
    if (localStorage.getItem('note-' + dateKey)) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dayEl.appendChild(dot);
    }

    dayEl.onclick = () => openNoteModal(dateKey, i, monthNames[month]);
    daysContainer.appendChild(dayEl);
  }

  const hr = now.getHours();
  const greeting = document.getElementById('greeting');
  if(hr < 12) greeting.innerText = "Good morning, Dreamr ✨";
  else if(hr < 18) greeting.innerText = "Good afternoon, Dreamr ✨";
  else greeting.innerText = "Good evening, Dreamr ✨";
}

// --- LOGIC FOR TIMESTAMPED NOTES ---
function openNoteModal(key, day, monthName) {
  selectedDateKey = key;
  document.getElementById('modal-date-title').innerText = `${monthName} ${day}`;
  
  const savedData = localStorage.getItem('note-' + key);
  if (savedData) {
    const parsed = JSON.parse(savedData);
    document.getElementById('dream-note').value = parsed.text;
    document.getElementById('last-saved-time').innerText = "Last edited at: " + parsed.time;
  } else {
    document.getElementById('dream-note').value = "";
    document.getElementById('last-saved-time').innerText = "No entries yet.";
  }
  
  document.getElementById('calendar-modal').style.display = 'flex';
}

function saveNote() {
  const noteText = document.getElementById('dream-note').value;
  const now = new Date();
  const timestamp = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

  if(noteText.trim() === "") {
    localStorage.removeItem('note-' + selectedDateKey);
  } else {
    const dataToSave = {
      text: noteText,
      time: timestamp
    };
    localStorage.setItem('note-' + selectedDateKey, JSON.stringify(dataToSave));
  }
  
  closeCalendar();
  generateCalendar();
}

function closeCalendar() { document.getElementById('calendar-modal').style.display = 'none'; }

// --- JUKEBOX ---
const songs = [
   { title: "Dreamy", url: "https://www.cafedreamr.art/music/Dreamy.mp3" },
  { title: "Etiquette-Cafe", url: "https://www.cafedreamr.art/music/Etiquette-Cafe0.mp3" }
];
let currentTrack = 0;
const audio = document.getElementById('main-audio');
const playBtn = document.getElementById('play-btn');

function initPlayer() {
  const container = document.getElementById('playlist-list');
  songs.forEach((song, i) => {
    const div = document.createElement('div');
    div.className = 'track-item';
    div.innerText = song.title;
    div.onclick = () => loadTrack(i);
    container.appendChild(div);
  });
  loadTrack(0, false);
}

function loadTrack(i, playNow = true) {
  currentTrack = i; audio.src = songs[i].url;
  document.getElementById('track-title').innerText = songs[i].title;
  document.querySelectorAll('.track-item').forEach((el, idx) => el.classList.toggle('active', idx === i));
  if(playNow) { audio.play(); playBtn.innerText = '⏸'; }
}

function togglePlay() {
  if(audio.paused) { audio.play(); playBtn.innerText = '⏸'; }
  else { audio.pause(); playBtn.innerText = '▶'; }
}

function nextTrack() { loadTrack((currentTrack + 1) % songs.length); }
function prevTrack() { loadTrack((currentTrack - 1 + songs.length) % songs.length); }
audio.onended = nextTrack;

// INIT
updateClock();
generateCalendar();
initPlayer();
</script>
</body>
</html>
