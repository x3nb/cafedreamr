<script>

/* =========================================
   STELL WINDOW TOGGLE
========================================= */

function toggleStellChat() {

  document
    .getElementById('stellWindow')
    .classList
    .toggle('active');
}

/* =========================================
   STELL MOOD SYSTEM
========================================= */

function getTimeMood() {

  const hour = new Date().getHours();

  if(hour >= 0 && hour < 5) {
    return "late-night";
  }

  if(hour >= 5 && hour < 12) {
    return "morning";
  }

  if(hour >= 12 && hour < 18) {
    return "afternoon";
  }

  return "evening";
}

/* =========================================
   ENHANCED CHAT HANDLER
========================================= */

const originalHandleChat = handleChat;

handleChat = function(val) {

  const msg = val.trim();

  if (!msg) return;

  appendChatMessage('You', msg);

  document.getElementById('chat-input').value = "";

  const typingBubble = document.createElement('div');

  typingBubble.className =
    'chat-message stell-msg typing-msg';

  typingBubble.innerHTML = `
    <img
      class="chat-avatar"
      src="https://3society.neocities.org/GUILD/StellasRealmChat/000logo.jpeg"
    >

    <div class="chat-bubble">
      Stell is thinking...
    </div>
  `;

  const out =
    document.getElementById('chat-output');

  out.appendChild(typingBubble);

  out.scrollTop = out.scrollHeight;

  const lowerMsg = msg.toLowerCase();

  let reply;
  let found = false;

  for (const key in responses) {

    if (lowerMsg.includes(key)) {

      reply = responses[key];
      found = true;
      break;
    }
  }

  if (!found) {

    reply =
      responses.default[
        Math.floor(
          Math.random() *
          responses.default.length
        )
      ];
  }

  const mood = getTimeMood();

  if(mood === 'late-night') {
    reply += " 🌙";
  }

  if(mood === 'morning') {
    reply += " ☀️";
  }

  setTimeout(() => {

    typingBubble.remove();

    appendChatMessage(
      'Stell',
      reply
    );

  }, 900 + Math.random() * 900);
};

</script>
